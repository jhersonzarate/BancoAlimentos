<!-- src/app/shared/sidebar/sidebar.component.html — CON LOGOUT -->

<!-- Overlay para cerrar el sidebar en móvil -->
<div class="sidebar-overlay"
     [class.activo]="sidebarService.abierto$ | async"
     (click)="cerrar()">
</div>

<aside class="sidebar" [class.sidebar--abierto]="sidebarService.abierto$ | async">

  <div class="sidebar__marca">
    <img src="logo-banco.png" alt="Banco de Alimentos Perú" class="sidebar__logo-img">
    <button class="sidebar__cerrar-btn" (click)="cerrar()" aria-label="Cerrar menú">
      <span class="material-icons">close</span>
    </button>
  </div>

  <nav class="sidebar__nav">
    <p class="sidebar__seccion-titulo">Menú principal</p>

    <a class="sidebar__link"
       routerLink="/dashboard"
       routerLinkActive="sidebar__link--activo"
       (click)="cerrarAlNavegar()">
      <span class="material-icons sidebar__link-icono">dashboard</span>
      Dashboard
    </a>

    <a class="sidebar__link"
       routerLink="/donaciones"
       routerLinkActive="sidebar__link--activo"
       (click)="cerrarAlNavegar()">
      <span class="material-icons sidebar__link-icono">volunteer_activism</span>
      Donaciones
    </a>

    <a class="sidebar__link"
       routerLink="/organizaciones"
       routerLinkActive="sidebar__link--activo"
       (click)="cerrarAlNavegar()">
      <span class="material-icons sidebar__link-icono">corporate_fare</span>
      Organizaciones
    </a>

    <a class="sidebar__link"
       routerLink="/distribuciones"
       routerLinkActive="sidebar__link--activo"
       (click)="cerrarAlNavegar()">
      <span class="material-icons sidebar__link-icono">local_shipping</span>
      Distribución
    </a>
  </nav>

  <!-- Usuario y logout -->
  <div class="sidebar__usuario" *ngIf="usuario">
    <div class="sidebar__usuario-info">
      <span class="material-icons sidebar__usuario-avatar">account_circle</span>
      <div class="sidebar__usuario-datos">
        <span class="sidebar__usuario-nombre">{{ usuario.nombre }}</span>
        <span class="sidebar__usuario-email">{{ usuario.email }}</span>
      </div>
    </div>
    <button class="sidebar__logout" (click)="cerrarSesion()" title="Cerrar sesión">
      <span class="material-icons">logout</span>
      Cerrar sesión
    </button>
  </div>

  <div class="sidebar__footer">
    <p>Sistema v1.0</p>
    <p>Gestión de Donaciones</p>
  </div>

</aside>
