<!-- src/app/pages/donaciones/formulario-donacion/formulario-donacion.component.html -->
<app-topbar [titulo]="esEdicion ? 'Editar donación' : 'Nueva donación'"></app-topbar>

<div class="page-body">
  <div class="page-header">
    <div>
      <h1>{{ esEdicion ? 'Editar donación' : 'Registrar nueva donación' }}</h1>
      <p>Complete los datos del alimento donado</p>
    </div>
    <button class="btn btn--secundario" routerLink="/donaciones">
      <span class="material-icons">arrow_back</span>
      Volver
    </button>
  </div>

  <div class="card formulario-card">
    <form [formGroup]="form" (ngSubmit)="guardar()">

      <div class="form-fila">
        <div class="form-grupo">
          <label>Nombre del donante *</label>
          <input type="text" formControlName="donante" placeholder="Ej: Supermercados Plaza Vea">
          <span class="error-msg"
                *ngIf="form.get('donante')?.invalid && form.get('donante')?.touched">
            El donante es obligatorio
          </span>
        </div>

        <div class="form-grupo">
          <label>Tipo de alimento *</label>
          <input type="text" formControlName="tipoAlimento" placeholder="Ej: Arroz, Fideos, Aceite">
          <span class="error-msg"
                *ngIf="form.get('tipoAlimento')?.invalid && form.get('tipoAlimento')?.touched">
            El tipo de alimento es obligatorio
          </span>
        </div>
      </div>

      <div class="form-fila">
        <div class="form-grupo">
          <label>Cantidad *</label>
          <input type="number" formControlName="cantidad" placeholder="0.00" min="0.01" step="0.01">
          <span class="error-msg"
                *ngIf="form.get('cantidad')?.invalid && form.get('cantidad')?.touched">
            Ingrese una cantidad válida
          </span>
        </div>

        <div class="form-grupo">
          <label>Unidad *</label>
          <select formControlName="unidad">
            <option value="kg">Kilogramos (kg)</option>
            <option value="litros">Litros</option>
            <option value="unidades">Unidades</option>
            <option value="cajas">Cajas</option>
            <option value="sacos">Sacos</option>
          </select>
        </div>
      </div>

      <div class="form-fila">
        <div class="form-grupo">
          <label>Fecha de donación</label>
          <input type="date" formControlName="fechaDonacion">
        </div>

        <div class="form-grupo">
          <label>Fecha de vencimiento</label>
          <input type="date" formControlName="fechaVencimiento">
        </div>
      </div>

      <div class="form-grupo">
        <label>Observaciones</label>
        <textarea formControlName="observaciones"
                  placeholder="Notas adicionales sobre la donación..."></textarea>
      </div>

      <div class="formulario-acciones">
        <button type="button" class="btn btn--secundario" routerLink="/donaciones">
          <span class="material-icons">close</span>
          Cancelar
        </button>
        <button type="submit" class="btn btn--primario" [disabled]="form.invalid || guardando">
          <span class="material-icons">save</span>
          {{ guardando ? 'Guardando...' : (esEdicion ? 'Actualizar' : 'Registrar donación') }}
        </button>
      </div>

    </form>
  </div>
</div>
